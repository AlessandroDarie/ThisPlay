<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SetFree TV - Core Engine</title>
    <style>
        body {
            background-color: #18181b;
            color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 2rem;
            line-height: 1.6;
        }
        .monitor {
            background-color: #000;
            border: 1px solid #3f3f46;
            padding: 1.5rem;
            border-radius: 6px;
            font-family: monospace;
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: 0 auto;">
        <h1 style="text-transform: uppercase; letter-spacing: -1px;">Motore Dati Offline</h1>
        <div class="monitor">
            > Sistema inizializzato.<br>
            > L'interfaccia grafica è disabilitata.<br>
            > Apri la Console Sviluppatore del browser (F12) per leggere l'esito del test di rete e storage.
        </div>
        <div style="margin-top: 2rem; padding: 1.5rem; border: 1px solid #3f3f46; border-radius: 6px; background-color: #09090b;">
            <h3 style="margin-top: 0; color: #f4f4f5;">Cerca Serie</h3>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="search-input" placeholder="Es: Scissione..." style="flex: 1; padding: 0.5rem; background: #27272a; color: white; border: 1px solid #52525b; border-radius: 4px;">
                <button onclick="searchSeries()" style="padding: 0.5rem 1rem; background: #fafafa; color: #18181b; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Cerca</button>
            </div>
            
            <div id="search-results" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem;"></div>
        </div>
    </div>

    <!-- 1. Importazione del motore IndexedDB -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <!-- 2. Variabili d'ambiente e API (Il Ponte) -->
    <script src="api-config.js"></script>

    <!-- 3. Logica del database e chiamate di rete (I Silos) -->
    <script src="app.js"></script>
</body>
</html>
